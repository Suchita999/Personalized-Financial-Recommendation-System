services:
  - type: web
    name: finwise-app
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install --no-deps -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: ANONYMIZED_TELEMETRY
        value: false
      - key: CHROMA_TELEMETRY
        value: false
      - key: POSTHOG_DISABLE
        value: true
      - key: PIP_NO_CACHE_DIR
        value: /tmp/pip-cache
